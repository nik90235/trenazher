<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажер паронимов — Никита Мельников</title>
    <style>
        :root {
            --page-bg: #f0f4f8; 
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #8e9cae;
            --accent-orange: #f25c05; 
            --accent-blue-bg: #e8f0fe; 
            --accent-blue-text: #2368EE;
            --primary: #3182ce;
            --success: #10b981;
            --success-bg: #e6fdf5;
            --error: #ef4444;
            --error-bg: #fdf2f2;
            --border-color: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--page-bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        .app-container {
            background-color: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(142, 156, 174, 0.15);
            width: 100%;
            max-width: 850px;
            padding: 40px;
            box-sizing: border-box;
            text-align: center;
        }

        .brand-header {
            font-size: 15px;
            color: var(--text-muted);
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        .main-title {
            color: var(--accent-orange);
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0 0 25px 0;
        }

        .status-badge {
            display: inline-block;
            background-color: var(--accent-blue-bg);
            color: var(--accent-blue-text);
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 35px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--accent-orange);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -17px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--accent-orange);
            border-radius: 3px 3px 0 0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ТЕСТ */
        .definition-display {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.5;
            margin-bottom: 30px;
            color: var(--text-main);
            min-height: 60px;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option-btn {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:hover:not([disabled]) {
            border-color: var(--accent-blue-text);
            background-color: #f7fafc;
        }

        .option-btn.correct {
            background-color: var(--success-bg) !important;
            border-color: var(--success) !important;
            color: #065f46 !important;
        }

        .option-btn.wrong {
            background-color: var(--error-bg) !important;
            border-color: var(--error) !important;
            color: #991b1b !important;
        }

        .info-panel {
            background-color: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
            font-size: 15px;
            line-height: 1.6;
        }

        .info-panel .paronym-entry {
            margin-bottom: 12px;
        }

        .info-panel .paronym-entry:last-child {
            margin-bottom: 0;
        }

        /* СОПОСТАВЛЕНИЕ */
        .match-grid {
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            gap: 15px;
            margin-top: 20px;
            text-align: left;
        }

        .match-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .match-card {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 14px;
            font-weight: 600;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.2s ease;
            position: relative;
        }

        .match-card:hover:not(.matched):not(.selected) {
            border-color: var(--accent-blue-text);
            transform: translateY(-1px);
        }

        .match-card.selected {
            border-color: var(--accent-blue-text);
            background-color: var(--accent-blue-bg);
            font-weight: 700;
        }

        .match-card.matched {
            background-color: var(--success-bg) !important;
            border-color: var(--success) !important;
            color: #065f46 !important;
            cursor: default;
            pointer-events: none;
            font-weight: 700;
        }

        .match-card.matched::after {
            content: attr(data-pair-num);
            position: absolute;
            top: 4px;
            right: 6px;
            background-color: var(--success);
            color: white;
            font-size: 9px;
            font-weight: 800;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .match-card.error-blink {
            border-color: var(--error) !important;
            background-color: var(--error-bg) !important;
            color: #991b1b !important;
            animation: shake 0.4s ease-in-out;
        }

        .control-row {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn-control {
            flex: 1;
            background-color: var(--text-main);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-control:hover:not([disabled]) {
            opacity: 0.9;
        }

        .btn-control:disabled {
            background-color: #cbd5e1;
            cursor: not-allowed;
        }

        .btn-control.secondary {
            background-color: #e2e8f0;
            color: var(--text-main);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }

        @media(max-width: 600px) {
            .match-grid {
                grid-template-columns: 1fr;
            }
            .app-container {
                padding: 24px;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="brand-header">НМ | Никита Мельников +7 927 422 35 59</div>
    <h1 class="main-title">Тренажер паронимов</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('test-tab')">Классический тест</button>
        <button class="tab-btn" onclick="switchTab('match-tab')">Сопоставление</button>
    </div>

    <!-- ТЕСТ -->
    <div id="test-tab" class="tab-content active">
        <div class="status-badge" id="test-counter">Загрузка...</div>
        
        <div class="definition-display" id="test-definition">Загрузка...</div>
        <div class="options-list" id="test-options"></div>

        <div class="info-panel" id="test-feedback" style="display: none;">
            <div style="font-weight: 800; font-size: 18px; margin-bottom: 12px;" id="feedback-title"></div>
            <div id="feedback-body"></div>
        </div>

        <div class="control-row">
            <button class="btn-control secondary" id="btn-prev" onclick="prevTestQuestion()">Назад</button>
            <button class="btn-control" id="btn-next" onclick="nextTestQuestion()">Дальше</button>
        </div>
    </div>

    <!-- СОПОСТАВЛЕНИЕ -->
    <div id="match-tab" class="tab-content">
        <div style="font-size: 14px; color: var(--text-muted); margin-bottom: 15px;">
            Перед вами 2 пары похожих паронимов. Сопоставьте каждое слово с его верным лексическим значением.
        </div>

        <div class="match-grid">
            <div class="match-column" id="match-words"></div>
            <div class="match-column" id="match-defs"></div>
        </div>

        <div class="control-row">
            <button class="btn-control" onclick="initMatchRound()">Следующие 4 паронима</button>
        </div>
    </div>
</div>

    // --- СОСТОЯНИЕ ТЕСТА ---
    let testQuestions = [];
    let testCurrentIdx = 0;
    let testScore = 0;
    let testAnswers = {};

    // --- СОСТОЯНИЕ СОПОСТАВЛЕНИЯ ---
    let selectedWordCard = null;
    let selectedDefCard = null;
    let solvedCount = 0;
    let currentMatchRoundWords = [];

    function initTestMode() {
        testQuestions = [];
        testAnswers = {};
        testScore = 0;
        testCurrentIdx = 0;

        paronymsDict.forEach(pairObj => {
            pairObj.words.forEach(wordObj => {
                testQuestions.push({
                    definition: wordObj.definition,
                    correctWord: wordObj.word,
                    examples: wordObj.examples,
                    options: pairObj.words.map(w => w.word),
                    pairName: pairObj.pair,
                    allGroupWords: pairObj.words 
                });
            });
        });

        shuffle(testQuestions);
        loadTestQuestion();
    }

    function loadTestQuestion() {
        const q = testQuestions[testCurrentIdx];
        const state = testAnswers[testCurrentIdx] || { answered: false };

        const remaining = testQuestions.length - testCurrentIdx;
        document.getElementById('test-counter').innerText = `Осталось: ${remaining} | Верно: ${testScore}`;
        document.getElementById('test-definition').innerText = q.definition;

        const optionsContainer = document.getElementById('test-options');
        optionsContainer.innerHTML = '';

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;

            if (state.answered) {
                btn.disabled = true;
                if (opt === q.correctWord) {
                    btn.classList.add('correct');
                } else if (opt === state.selected && !state.isCorrect) {
                    btn.classList.add('wrong');
                }
            } else {
                btn.onclick = () => submitAnswer(opt);
            }
            optionsContainer.appendChild(btn);
        });

        const fb = document.getElementById('test-feedback');
        if (state.answered) {
            fb.style.display = 'block';
            const title = document.getElementById('feedback-title');
            if (state.isCorrect) {
                title.innerText = 'Абсолютно верно!';
                title.style.color = 'var(--success)';
            } else {
                title.innerText = 'Ошибка. Давайте разберем разницу:';
                title.style.color = 'var(--error)';
            }

            let feedbackHTML = `<div style="margin-bottom: 15px;">Группа: <strong>${q.pairName}</strong></div>`;
            q.allGroupWords.forEach(wordObj => {
                feedbackHTML += `
                    <div class="paronym-entry">
                        <strong>${wordObj.word}</strong> — ${wordObj.definition}<br>
                        <span style="color: var(--text-muted); font-size: 14px; font-style: italic;">Примеры: ${wordObj.examples.join(', ')}</span>
                    </div>
                `;
            });

            document.getElementById('feedback-body').innerHTML = feedbackHTML;
        } else {
            fb.style.display = 'none';
        }

        document.getElementById('btn-prev').disabled = (testCurrentIdx === 0);
        document.getElementById('btn-next').innerText = (testCurrentIdx === testQuestions.length - 1) ? 'Заново' : 'Дальше';
    }

    function submitAnswer(selected) {
        const q = testQuestions[testCurrentIdx];
        const isCorrect = (selected === q.correctWord);
        if (isCorrect) testScore++;

        testAnswers[testCurrentIdx] = {
            answered: true,
            selected: selected,
            isCorrect: isCorrect
        };

        loadTestQuestion();
    }

    function nextTestQuestion() {
        if (testCurrentIdx === testQuestions.length - 1) {
            initTestMode();
        } else {
            testCurrentIdx++;
            loadTestQuestion();
        }
    }

    function prevTestQuestion() {
        if (testCurrentIdx > 0) {
            testCurrentIdx--;
            loadTestQuestion();
        }
    }

    function initMatchRound() {
        selectedWordCard = null;
        selectedDefCard = null;
        solvedCount = 0;

        let dictionaryCopy = [...paronymsDict];
        shuffle(dictionaryCopy);
        const selectedGroups = dictionaryCopy.slice(0, 2);

        currentMatchRoundWords = [];
        let globalId = 0;

        selectedGroups.forEach(group => {
            group.words.forEach(wordObj => {
                currentMatchRoundWords.push({
                    id: globalId,
                    word: wordObj.word,
                    definition: wordObj.definition
                });
                globalId++;
            });
        });

        const wordsCol = document.getElementById('match-words');
        const defsCol = document.getElementById('match-defs');
        wordsCol.innerHTML = '';
        defsCol.innerHTML = '';

        let wordsList = currentMatchRoundWords.map(item => ({ id: item.id, text: item.word }));
        shuffle(wordsList);

        let defsList = currentMatchRoundWords.map(item => ({ id: item.id, text: item.definition }));
        shuffle(defsList);

        wordsList.forEach(item => {
            const card = document.createElement('div');
            card.className = 'match-card';
            card.innerText = item.text;
            card.dataset.id = item.id;
            card.onclick = () => selectWord(card);
            wordsCol.appendChild(card);
        });

        defsList.forEach(item => {
            const card = document.createElement('div');
            card.className = 'match-card';
            card.innerText = item.text;
            card.dataset.id = item.id;
            card.onclick = () => selectDef(card);
            defsCol.appendChild(card);
        });
    }

    function selectWord(card) {
        if (card.classList.contains('matched') || card.classList.contains('error-blink')) return;
        
        const active = document.querySelector('#match-words .match-card.selected');
        if (active) active.classList.remove('selected');

        card.classList.add('selected');
        selectedWordCard = card;
        checkMatch();
    }

    function selectDef(card) {
        if (card.classList.contains('matched') || card.classList.contains('error-blink')) return;

        const active = document.querySelector('#match-defs .match-card.selected');
        if (active) active.classList.remove('selected');

        card.classList.add('selected');
        selectedDefCard = card;
        checkMatch();
    }

    function checkMatch() {
        if (selectedWordCard && selectedDefCard) {
            const wId = selectedWordCard.dataset.id;
            const dId = selectedDefCard.dataset.id;

            if (wId === dId) {
                solvedCount++;
                selectedWordCard.classList.remove('selected');
                selectedDefCard.classList.remove('selected');

                selectedWordCard.classList.add('matched');
                selectedDefCard.classList.add('matched');

                selectedWordCard.setAttribute('data-pair-num', solvedCount);
                selectedDefCard.setAttribute('data-pair-num', solvedCount);

                checkMatchWin();
            } else {
                const wCard = selectedWordCard;
                const dCard = selectedDefCard;
                wCard.classList.add('error-blink');
                dCard.classList.add('error-blink');

                setTimeout(() => {
                    wCard.classList.remove('error-blink', 'selected');
                    dCard.classList.remove('error-blink', 'selected');
                }, 800);
            }
            selectedWordCard = null;
            selectedDefCard = null;
        }
    }

    function checkMatchWin() {
        if (solvedCount === currentMatchRoundWords.length) {
            setTimeout(() => {
                alert('Отлично! Сетка полностью разобрана.');
                initMatchRound();
            }, 1200);
        }
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');

        if (tabId === 'test-tab') {
            initTestMode();
        } else {
            initMatchRound();
        }
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    window.onload = () => {
        initTestMode();
    };
</script>

</body>
</html>
