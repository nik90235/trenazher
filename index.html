            -webkit-user-select: none;

        }
        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(49, 130, 206, 0.1);
            padding: 30px 20px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-sizing: border-box;
            border: 1px solid #e2e8f0;
            position: relative;
        }
        @media (min-width: 480px) { .card { padding: 40px 30px; } }

        .word-display { font-size: 38px; font-weight: 700; letter-spacing: 2px; margin-bottom: 25px; min-height: 55px; }
        @media (min-width: 360px) { .word-display { font-size: 42px; letter-spacing: 3px; } }
        .letter { display: inline-block; padding: 0 1px; }
        .vowel { cursor: pointer; color: #2b6cb0; border-bottom: 2px dashed #90cdf4; transition: all 0.2s ease; -webkit-tap-highlight-color: transparent; }
        .vowel:hover { color: #3182ce; background-color: #ebf8ff; border-bottom-style: solid; }
        .letter.success-pick { color: #38a169 !important; border-bottom: 3px solid #38a169; transform: scale(1.1); }
        .letter.danger-pick { color: #e53e3e !important; border-bottom: 3px solid #e53e3e; text-decoration: line-through; }
        .status-msg { font-size: 17px; font-weight: 600; min-height: 30px; margin-bottom: 25px; line-height: 1.4; }
        .status-msg.green { color: #38a169; }
        .status-msg.red { color: #e53e3e; }
        .answer-hint { font-size: 24px; font-weight: 700; letter-spacing: 1px; color: #2d3748; margin-top: 8px; }
        .answer-hint span { color: #38a169; border-bottom: 2px solid #38a169; }
        .nav-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
        @media (min-width: 380px) { .nav-buttons { flex-direction: row; justify-content: center; gap: 12px; } }
        .action-btn { background-color: #3182ce; color: #ffffff; border: none; padding: 14px 24px; font-size: 16px; border-radius: 10px; cursor: pointer; font-weight: 600; box-shadow: 0 4px 12px rgba(49, 130, 206, 0.2); transition: all 0.2s; -webkit-tap-highlight-color: transparent; width: 100%; box-sizing: border-box; }
        @media (min-width: 380px) { .action-btn { width: auto; } }
        .action-btn:hover { background-color: #2b6cb0; }
        .back-btn { background-color: #edf2f7; color: #4a5568; box-shadow: none; border: 1px solid #cbd5e0; }
        .restart-btn { background-color: #38a169; box-shadow: 0 4px 12px rgba(56, 161, 105, 0.2); width: 100%; }

        {"word": "брала", "correct": "бралА"}, {"word": "диспансер", "correct": "диспансЕр"}, {"word": "отозвалась", "correct": "отозвалАсь"}
    ];

    let dataset = []; let activeIdx = 0; let rightCount = 0; let totalClicks = 0; let locked = false; const vowelChars = "аеёиоуыэюя";

    function initializeDataset() {
        dataset = rawDataset.map(item => {
            let accentIndex = -1; const cleanedCorrect = item.correct.trim();
            for (let i = 0; i < cleanedCorrect.length; i++) {
                const char = cleanedCorrect[i];
                if (char === 'Ё' || (char === char.toUpperCase() && char !== char.toLowerCase())) { accentIndex = i; break; }
            }
            return { word: item.word.replace(/[^а-яё]/gi, '').trim().toLowerCase(), correct: cleanedCorrect, accentIndex: accentIndex };
        });
        for (let i = dataset.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1)); [dataset[i], dataset[j]] = [dataset[j], dataset[i]];
        }
    }

    function refreshMeta() { document.getElementById('progressInfo').innerText = `Осталось: ${dataset.length - activeIdx} | Верно: ${rightCount}/${totalClicks}`; }

    function renderCard() {
        const displayEl = document.getElementById('wordDisplay'); const msgEl = document.getElementById('statusMsg');
        const btnNext = document.getElementById('nextActionBtn'); const btnBack = document.getElementById('backActionBtn');
        const btnRestart = document.getElementById('restartActionBtn'); const progressEl = document.getElementById('progressInfo');

        if (activeIdx >= dataset.length) {
            displayEl.innerHTML = "🎉 Великолепно!"; msgEl.className = "status-msg green";
            msgEl.innerHTML = `Все слова пройдены!<br>Итоговый счёт: ${rightCount} из ${totalClicks}`;
            btnNext.style.display = 'none'; btnBack.style.display = 'none'; btnRestart.style.display = 'inline-block';
            progressEl.style.display = 'none'; return;
        }

        locked = false; const current = dataset[activeIdx]; msgEl.innerHTML = ""; msgEl.className = "status-msg";
        btnNext.style.display = 'none'; btnRestart.style.display = 'none'; progressEl.style.display = 'inline-block';
        btnBack.style.display = activeIdx > 0 ? 'inline-block' : 'none'; displayEl.innerHTML = "";

        for (let i = 0; i < current.word.length; i++) {
            const letter = current.word[i]; const span = document.createElement('span');
            span.innerText = letter; span.className = 'letter';
            if (vowelChars.includes(letter)) { span.classList.add('vowel'); span.onclick = () => evaluate(i, span); }
            displayEl.appendChild(span);
        }
        refreshMeta();
    }

    function evaluate(clickedPosition, element) {
        if (locked) return; const current = dataset[activeIdx]; locked = true; totalClicks++;
        document.querySelectorAll('.letter').forEach(el => el.classList.remove('vowel'));

        if (clickedPosition === current.accentIndex) {
            element.classList.add('success-pick'); const msgEl = document.getElementById('statusMsg');
            msgEl.className = "status-msg green"; msgEl.innerText = "Правильно!"; rightCount++;
        } else {
            element.classList.add('danger-pick'); const standardLetters = document.getElementById('wordDisplay').children;
            if (standardLetters[current.accentIndex]) standardLetters[current.accentIndex].classList.add('success-pick');
            const msgEl = document.getElementById('statusMsg'); msgEl.className = "status-msg red";
            let formattedWord = "";
            for(let i=0; i<current.correct.length; i++) {
                let sym = current.correct[i];
                if (sym === 'Ё' || (sym === sym.toUpperCase() && sym !== sym.toLowerCase())) formattedWord += `<span>${sym.toLowerCase()}</span>`;
                else formattedWord += sym;
            }
            msgEl.innerHTML = `Неверно. Правильно:<br><div class="answer-hint">${formattedWord}</div>`;
        }
        document.getElementById('nextActionBtn').style.display = 'inline-block';
        document.getElementById('backActionBtn').style.display = activeIdx > 0 ? 'inline-block' : 'none'; refreshMeta();
    }

    function advance() { activeIdx++; renderCard(); }
    function goBack() { if (activeIdx > 0) { activeIdx--; renderCard(); } }
    function restartTest() { activeIdx = 0; rightCount = 0; totalClicks = 0; initializeDataset(); renderCard(); }

    window.onload = () => { initializeDataset(); renderCard(); };
</script>
